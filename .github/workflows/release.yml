# CI: build the Lystn Rust binaries for every OS and attach them to the Release,
# then publish the npm package automatically WITH PROVENANCE.
#
# WHERE THIS GOES: this lives at .github/workflows/release.yml in the PUBLIC
# `lystn-cli` repo. That repo has the Rust source at `cli-rs/` and the npm
# package at the root. (A synced copy is kept at packaging/npm/release.yml in the
# private Lystn repo.)
#
# HOW IT RUNS: push a tag like `v0.3.5` (matching package.json's version).
# GitHub builds all targets, uploads `lystn-<target>` assets to the Release, then
# the `publish` job publishes to npm. No manual `npm publish` needed.
#
# PROVENANCE = the green "Built and signed on GitHub Actions" badge on npmjs.com.
# It cryptographically links the package to this repo + commit + workflow run.
#
# AUTH = npm "Trusted Publishing" via OIDC. NO token is stored anywhere, and your
# npm 2FA stays fully enabled. The workflow proves its identity to npm directly.
#
# ONE-TIME SETUP (Trusted Publishing — do this once on npmjs.com):
#   npmjs.com -> your package `lystn-cli` -> Settings -> "Trusted Publisher"
#   -> GitHub Actions, then enter:
#        Organization or user:  burakayener
#        Repository:            lystn-cli
#        Workflow filename:     release.yml
#        Environment:           (leave blank)
#   Save. That authorizes THIS workflow to publish. No NPM_TOKEN secret required
#   (you can delete the old NPM_TOKEN secret + any granular token afterward).
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # needed to create/upload the GitHub Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"
          - os: macos-15              # Apple Silicon only (Intel Macs unsupported)
            target: aarch64-apple-darwin
            ext: ""
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Linux audio headers (cpal needs ALSA)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Install Rust + target
        run: rustup update stable && rustup target add ${{ matrix.target }}

      - name: Build
        working-directory: cli-rs
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          cp "cli-rs/target/${{ matrix.target }}/release/lystn${{ matrix.ext }}" \
             "dist/lystn-${{ matrix.target }}${{ matrix.ext }}"

      - name: Upload to the Release (gh CLI — no Node action, no deprecation noise)
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" \
            --notes "Lystn $GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" || true
          gh release upload "$GITHUB_REF_NAME" \
            "dist/lystn-${{ matrix.target }}${{ matrix.ext }}" \
            --clobber --repo "$GITHUB_REPOSITORY"

  # Publish to npm via OIDC "Trusted Publishing" — no token, 2FA stays on.
  # Runs after the binaries exist so a fresh `npm install -g lystn-cli` can
  # immediately download the matching binary. Provenance is generated automatically.
  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # OIDC — lets npm authenticate this workflow + sign provenance
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm (Trusted Publishing needs npm >= 11.5.1)
        run: npm install -g npm@latest

      - name: Publish to npm (Trusted Publishing + provenance)
        run: npm publish --provenance --access public
